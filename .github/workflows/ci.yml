name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Check CLI syntax
        run: npm run lint

      - name: Check examples
        run: npm run test:examples

      - name: Run tests
        run: npm test

      - name: Run OpenAI JS tool-calling example
        run: npm run test:openai-js-tool-calls
